services:
  postgres:
    image: postgres:17-alpine
    container_name: poketeam-db
    restart: unless-stopped
    env_file:
      - .env.prod
    # Bind to localhost only — the app reaches Postgres over the docker
    # network. Remove this section entirely if you don't need host access.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poketeam-app
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
