spring:
  application:
    name: poketeam-builder

  profiles:
    active:
      - ${SPRING_PROFILES_ACTIVE:dev}

  threads:
    virtual:
      enabled: true

  # DB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:pokemon_sql}
    username: ${DB_USER:poketeam}
    password: ${DB_PASSWORD:poketeam}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.jdbc.batch_size]": 50
      "[hibernate.order_inserts]": true
      "[hibernate.order_updates]": true
      "[hibernate.jdbc.batch_versioned_data]": true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: ${MAIL_HOST}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
  mail:
    from: ${MAIL_FROM:noreply@poketeambuilder.com}
    contact-to: ${CONTACT_TO:poketeamdev@gmail.com}
  password-reset:
    token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:4200/auth/reset-password-confirmation}

  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpirationMs: ${ACCESS_TOKEN_EXPIRATION_MS:900000}
    refreshTokenExpirationMs: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}

# Server
server:
  port: ${PORT:8080}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    "[com.poketeambuilder]": INFO
    "[org.springframework.security]": INFO
