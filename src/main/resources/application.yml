spring:
  application:
    name: poketeam-builder

  profiles:
    active:
      - ${SPRING_PROFILES_ACTIVE:dev}

  app:
    cors:
      allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}

    jwt:
      accessTokenExpirationMs: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
      refreshTokenExpirationMs: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
      secret: ${JWT_SECRET:default_jwt_secret_key_which_should_be_changed_in_production}

  # DB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:pokemon_sql}
    username: ${DB_USER:poketeam}
    password: ${DB_PASSWORD:poketeam}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Server
server:
  port: ${PORT:8080}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    "[com.poketeambuilder]": INFO
    "[org.springframework.security]": INFO
