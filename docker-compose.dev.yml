services:
  postgres:
    image: postgres:17-alpine
    container_name: poketeam-db
    env_file:
      - .env.dev
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poketeam -d pokemon_sql"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
